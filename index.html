                hiddenLocations: Array.from(hiddenLocs).filter(loc => loc !== "小怪寶家長會") // 確保不儲存已刪除地點
            };
            try {
                localStorage.setItem(USER_SETTINGS_KEY, JSON.stringify(settings));
            } catch (e) { console.error('儲存設定失敗:', e); }
        }
        
        // 載入設定
        function loadSettings() {
            try {
                const saved = localStorage.getItem(USER_SETTINGS_KEY);
                if (saved) {
                    const settings = JSON.parse(saved);
                    if (settings.theme === 'light') {
                        isDarkTheme = false;
                        document.body.classList.add('light-theme');
                        document.getElementById('themeToggle').textContent = "🌙 切換暗色主題";
                    } else {
                        isDarkTheme = true;
                        document.body.classList.remove('light-theme');
                        document.getElementById('themeToggle').textContent = "☀️ 切換亮色主題";
                    }
                    if (settings.viewMode === 'list') {
                        document.body.classList.remove('view-grid');
                        document.body.classList.add('view-list');
                        document.getElementById('listBtn').classList.add('active');
                        document.getElementById('gridBtn').classList.remove('active');
                    } else {
                        document.body.classList.remove('view-list');
                        document.body.classList.add('view-grid');
                        document.getElementById('gridBtn').classList.add('active');
                        document.getElementById('listBtn').classList.remove('active');
                    }
                    if (settings.hiddenLocations && Array.isArray(settings.hiddenLocations)) {
                        hiddenLocs = new Set(settings.hiddenLocations);
                        cleanHiddenLocs(); // 確保舊地點被移除
                    }
                    return true;
                }
            } catch(e) { console.error('載入設定失敗:', e); }
            return false;
        }

        // 主題切換
        function toggleTheme() {
            isDarkTheme = !isDarkTheme;
            if (isDarkTheme) {
                document.body.classList.remove('light-theme');
                document.getElementById('themeToggle').textContent = "☀️ 切換亮色主題";
            } else {
                document.body.classList.add('light-theme');
                document.getElementById('themeToggle').textContent = "🌙 切換暗色主題";
            }
            updateFilterButtons();
            updateEventCards();
            updateStatusIndicator();   // 更新指示點顏色
            saveSettings();
        }

        // 更新篩選按鈕樣式 (僅針對現有兩個地點)
        function updateFilterButtons() {
            const filterButtons = document.querySelectorAll('.filter-btn');
            filterButtons.forEach(button => {
                const locName = button.textContent;
                const isHidden = hiddenLocs.has(locName);
                const config = locConfig[locName];
                if (config) {
                    if (isHidden) {
                        button.style.backgroundColor = isDarkTheme ? '#333' : '#eee';
                        button.style.color = isDarkTheme ? '#666' : '#adb5bd';
                        button.style.borderColor = isDarkTheme ? '#444' : '#dee2e6';
                    } else {
                        button.style.backgroundColor = isDarkTheme ? config.darkBg : config.lightBg;
                        button.style.color = config.color;
                        button.style.borderColor = config.borderColor;
                    }
                }
            });
        }

        // 更新活動卡片顏色 (動態套用主題)
        function updateEventCards() {
            const eventCards = document.querySelectorAll('.event:not(.no-event)');
            eventCards.forEach(card => {
                const eventData = card._eventData;
                if (eventData && locConfig[eventData.loc]) {
                    const config = locConfig[eventData.loc];
                    card.style.backgroundColor = isDarkTheme ? config.darkBg : config.lightBg;
                    card.style.color = isDarkTheme ? '#e0e0e0' : '#333';
                    card.style.borderLeftColor = config.borderColor;
                }
            });
        }
        
        // 動態產生狀態列指示器 (只顯示現有地點)
        function updateStatusIndicator() {
            const indicatorContainer = document.getElementById('statusIndicator');
            if (!indicatorContainer) return;
            indicatorContainer.innerHTML = '';
            Object.keys(locConfig).forEach(loc => {
                const config = locConfig[loc];
                const dotColor = config.borderColor;
                const div = document.createElement('div');
                div.className = 'indicator-item';
                div.innerHTML = `<div class="indicator-dot" style="background: ${dotColor}"></div><span>${loc}</span>`;
                indicatorContainer.appendChild(div);
            });
        }
        
        // 更新狀態文字 (隱藏狀況)
        function updateStatusBar() {
            const statusText = document.getElementById('statusText');
            const hiddenCount = hiddenLocs.size;
            if (hiddenCount === 0) {
                statusText.textContent = "顯示所有地點的活動";
            } else if (hiddenCount >= Object.keys(locConfig).length) {
                statusText.textContent = "所有地點活動皆已隱藏";
            } else {
                const hiddenList = Array.from(hiddenLocs).join('、');
                statusText.textContent = `已隱藏：${hiddenList}`;
            }
            updateStatusIndicator();
        }
        
        // 載入 CSV (過濾掉小怪寶家長會)
        async function load(force = false) {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                const lines = text.replace(/\r/g, '').split('\n').filter(l => l.trim());
                const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
                const rawEvents = [];
                for (let i = 1; i < lines.length; i++) {
                    const vals = [];
                    let cur = '', q = false;
                    let line = lines[i];
                    for (let j = 0; j < line.length; j++) {
                        let c = line[j];
                        if (c === '"') {
                            if (q && line[j+1] === '"') { cur += '"'; j++; }
                            else q = !q;
                        } else if (c === ',' && !q) {
                            vals.push(cur.trim().replace(/^"|"$/g, ''));
                            cur = '';
                        } else cur += c;
                    }
                    vals.push(cur.trim().replace(/^"|"$/g, ''));
                    const row = {};
                    headers.forEach((h, idx) => row[h] = vals[idx] || '');
                    const dateStr = row['日期'] || '';
                    const [m, d] = dateStr.split('/');
                    if (!m || !d) continue;
                    const locRaw = row['地點'] || '未指定';
                    // 直接過濾掉地點為「小怪寶家長會」的活動
                    if (locRaw === '小怪寶家長會') continue;
                    rawEvents.push({
                        date: `2026-${m.padStart(2,'0')}-${d.padStart(2,'0')}`,
                        time: row['時間'] || '',
                        loc: locRaw,
                        script: row['劇本名稱'] || '未命名劇本',
                        st: row['說書人'] || '待確認',
                        link: row['報名連結'] || '#'
                    });
                }
                events = rawEvents.filter(e => locConfig[e.loc] !== undefined); // 只保留有配置的合法地點 (避免髒資料)
                render();
            } catch (e) { 
                console.error(e);
                document.getElementById('countText').textContent = "載入失敗"; 
            }
        }

        // 渲染日曆與篩選按鈕
        function render() {
            // 生成篩選按鈕 (僅依據現有 locConfig)
            const f = document.getElementById('filters');
            f.innerHTML = '<div class="filter-label">地點篩選：</div>';
            Object.keys(locConfig).forEach(l => {
                const b = document.createElement('button');
                b.className = 'filter-btn';
                b.textContent = l;
                const isH = hiddenLocs.has(l);
                const c = locConfig[l];
                if (isH) {
                    b.style.backgroundColor = isDarkTheme ? '#333' : '#eee';
                    b.style.color = isDarkTheme ? '#666' : '#adb5bd';
                    b.style.borderColor = isDarkTheme ? '#444' : '#dee2e6';
                } else {
                    b.style.backgroundColor = isDarkTheme ? c.darkBg : c.lightBg;
                    b.style.color = c.color;
                    b.style.borderColor = c.borderColor;
                }
                b.onclick = () => {
                    if(hiddenLocs.has(l)) hiddenLocs.delete(l);
                    else hiddenLocs.add(l);
                    saveSettings();
                    render();
                };
                f.appendChild(b);
            });
            
            updateStatusBar();
            
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            
            const y = 2026, m = 5;   // 2026年5月
            const days = new Date(y, m, 0).getDate(); // 31
            const today = new Date().toISOString().split('T')[0];
            const isListMode = document.body.classList.contains('view-list');
            
            if (!isListMode) {
                // 網格模式: 先加星期表頭
                const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
                weekdays.forEach(day => {
                    const weekdayCell = document.createElement('div');
                    weekdayCell.className = 'weekday-cell';
                    weekdayCell.textContent = day;
                    grid.appendChild(weekdayCell);
                });
                
                const firstDayOfMonth = new Date(y, m-1, 1).getDay(); // 5/1 星期幾
                // 前置空白
                for (let i = 0; i < firstDayOfMonth; i++) {
                    const emptyCell = document.createElement('div');
                    emptyCell.className = 'day-cell empty-cell';
                    emptyCell.textContent = '';
                    grid.appendChild(emptyCell);
                }
            }
            
            let total = 0;
            let dateRange = [];
            if (isListMode) {
                const datesWithEvents = new Set();
                events.forEach(e => {
                    const [year, month, day] = e.date.split('-');
                    if (parseInt(year) === y && parseInt(month) === m && 
                        !hiddenLocs.has(e.loc) && 
                        (!query || e.script.includes(query) || e.st.includes(query) || e.loc.includes(query))) {
                        datesWithEvents.add(e.date);
                    }
                });
                dateRange = Array.from(datesWithEvents).sort();
            } else {
                for (let d=1; d<=days; d++) {
                    dateRange.push(`${y}-${m.toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`);
                }
            }
            
            dateRange.forEach(ds => {
                const [yy, mm, dd] = ds.split('-');
                const dayNum = parseInt(dd);
                const monthNum = parseInt(mm);
                const cell = document.createElement('div');
                cell.className = 'day-cell';
                if (ds === today) cell.classList.add('today');
                
                const num = document.createElement('div');
                num.className = 'day-number';
                num.innerHTML = `<span>${monthNum}/${dayNum}</span><span class="date-text">${['日','一','二','三','四','五','六'][new Date(yy, monthNum-1, dayNum).getDay()]}</span>`;
                cell.appendChild(num);
                
                const filtered = events.filter(e => e.date === ds && !hiddenLocs.has(e.loc) && 
                    (!query || e.script.includes(query) || e.st.includes(query) || e.loc.includes(query)));
                
                if (filtered.length > 0) {
                    if (isListMode) cell.classList.add('has-events');
                    total += filtered.length;
                    filtered.forEach(e => {
                        const div = document.createElement('div');
                        div.className = 'event';
                        const c = locConfig[e.loc] || { darkBg: "#2a2a2a", lightBg: "#f0f0f0", color: "#999", borderColor: "#999" };
                        div._eventData = e;
                        div.style.backgroundColor = isDarkTheme ? c.darkBg : c.lightBg;
                        div.style.color = isDarkTheme ? '#e0e0e0' : '#333';
                        div.style.borderLeftColor = c.borderColor;
                        div.innerHTML = `<span class="event-time">${e.time.substring(0,5)}</span><span class="event-title">${e.script}</span>`;
                        if (new Date() > new Date(`${e.date}T${e.time || '00:00'}`)) div.classList.add('passed');
                        div.onmousemove = (ev) => {
                            const t = document.getElementById('tooltip');
                            t.textContent = `${e.loc} - ${e.script}`;
                            t.style.opacity = '1';
                            t.style.display = 'block';
                            const rect = div.getBoundingClientRect();
                            let top = rect.top - 40;
                            let left = rect.left + rect.width / 2;
                            if (top < 10) top = rect.bottom + 10;
                            t.style.transform = 'translateX(-50%)';
                            t.style.top = `${top}px`;
                            t.style.left = `${left}px`;
                        };
                        div.onmouseleave = () => {
                            const t = document.getElementById('tooltip');
                            t.style.opacity = '0';
                            setTimeout(() => t.style.display = 'none', 200);
                        };
                        div.onclick = () => openModal(e, { month: monthNum, date: dayNum, weekday: ['日','一','二','三','四','五','六'][new Date(yy, monthNum-1, dayNum).getDay()] });
                        cell.appendChild(div);
                    });
                } else {
                    const none = document.createElement('div');
                    none.className = 'event no-event';
                    none.textContent = '暫無活動';
                    cell.appendChild(none);
                }
                grid.appendChild(cell);
            });
            
            // === 補足網格模式後方空白 (5/31之後的空白儲存格，讓背景與主背景完全一致) ===
            if (!isListMode) {
                const totalCells = firstDayOfMonth + days;
                const remainder = totalCells % 7;
                const trailingEmptyCount = remainder === 0 ? 0 : 7 - remainder;
                for (let i = 0; i < trailingEmptyCount; i++) {
                    const emptyCell = document.createElement('div');
                    emptyCell.className = 'day-cell empty-cell';
                    emptyCell.textContent = '';
                    emptyCell.style.backgroundColor = 'var(--bg-primary)';
                    grid.appendChild(emptyCell);
                }
            }
            
            document.getElementById('countText').textContent = `共顯示 ${total} 個活動 (2026年5月)`;
        }
        
        function openModal(e, dayInfo) {
            const modal = document.getElementById('eventModal');
            document.getElementById('modalTitle').textContent = e.script;
            document.getElementById('modalDate').textContent = `日期：${dayInfo.month}/${dayInfo.date}（${dayInfo.weekday}）`;
            document.getElementById('modalTime').textContent = `時間：${e.time ? e.time.substring(0,5) : ''}`;
            document.getElementById('modalLocation').textContent = `地點：${e.loc}`;
            document.getElementById('modalScript').textContent = `劇本：${e.script}`;
            document.getElementById('modalStoryteller').textContent = `說書人：${e.st || '待確認'}`;
            const linkBtn = document.getElementById('modalLinkBtn');
            const closeBtn = document.getElementById('modalCloseBtn');
            const passed = new Date() > new Date(`${e.date}T${e.time || '00:00'}`);
            if (e.link && e.link !== '#') {
                linkBtn.textContent = passed ? '前往查看' : '前往報名';
                linkBtn.style.backgroundColor = passed ? '#6c757d' : '#4dabf7';
                linkBtn.disabled = false;
                linkBtn.style.opacity = '1';
                linkBtn.style.cursor = 'pointer';
            } else {
                linkBtn.textContent = '無連結';
                linkBtn.disabled = true;
                linkBtn.style.opacity = '0.6';
                linkBtn.style.cursor = 'not-allowed';
                linkBtn.style.backgroundColor = '#6c757d';
            }
            linkBtn.onclick = () => { if(e.link && e.link !== '#') window.open(e.link, '_blank'); modal.classList.remove('active'); };
            closeBtn.onclick = () => modal.classList.remove('active');
            modal.onclick = (event) => { if (event.target === modal) modal.classList.remove('active'); };
            modal.classList.add('active');
        }
        
        // 事件綁定
        document.getElementById('gridBtn').onclick = () => {
            document.body.className = isDarkTheme ? 'view-grid' : 'view-grid light-theme';
            document.getElementById('gridBtn').classList.add('active');
            document.getElementById('listBtn').classList.remove('active');
            saveSettings();
            render();
        };
        document.getElementById('listBtn').onclick = () => {
            document.body.className = isDarkTheme ? 'view-list' : 'view-list light-theme';
            document.getElementById('listBtn').classList.add('active');
            document.getElementById('gridBtn').classList.remove('active');
            saveSettings();
            render();
        };
        document.getElementById('refreshBtn').onclick = () => load(true);
        document.getElementById('searchInput').oninput = (e) => { query = e.target.value.trim(); render(); };
        document.getElementById('themeToggle').onclick = toggleTheme;
        
        // 初始化
        function init() {
            loadSettings();
            cleanHiddenLocs();    // 確保隱藏集合乾淨
            updateStatusIndicator();
            if (window.innerWidth <= 768 && !document.body.classList.contains('view-list') && !document.body.classList.contains('view-grid')) {
                document.getElementById('listBtn').click();
            }
            function updateTime() {
                const now = new Date();
                document.getElementById('timeText').textContent = `更新時間: ${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
            }
            setInterval(updateTime, 60000);
            updateTime();
            load();
        }
        init();
    </script>
</body>
</html>
